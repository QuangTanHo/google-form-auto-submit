name: Auto Submit Google Form

on:
  schedule:
    - cron: '30 13 * * 1'
    - cron: '31 13 * * 2'
    - cron: '29 13 * * 3'
    - cron: '25 13 * * 4'
    - cron: '25 13 * * 5'
    - cron: '0 18 * * 1'
    - cron: '1 18 * * 2'
    - cron: '59 17 * * 3'
    - cron: '10 18 * * 4'
    - cron: '3 6 * * 5'
  workflow_dispatch:
    inputs:
      type:
        description: 'checkin or checkout'
        required: true
        type: choice
        options:
          - checkin
          - checkout

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: echo '${{ secrets.FORM_CONFIG }}' > config.json
      - name: Determine type
        id: type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "13" ]; then
              echo "type=checkin" >> $GITHUB_OUTPUT
            else
              echo "type=checkout" >> $GITHUB_OUTPUT
            fi
          fi
      - run: node cli.js --type=${{ steps.type.outputs.type }}